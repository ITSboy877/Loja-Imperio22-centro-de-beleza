<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Links da Loja</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        /* fundo marsala com degradê mais escuro nas bordas */
        background: radial-gradient(
          circle at top,
          #7a0507 0%,
          #5b0204 40%,
          #2a0001 100%
        );
        color: #f5f5f5;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .card {
        width: 100%;
        max-width: 420px;
        /* card num tom marsala mais fechado, semi-transparente */
        background: rgba(40, 0, 2, 0.9);
        border-radius: 18px;
        padding: 24px 20px 28px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
        text-align: center;
        border: 1px solid rgba(255, 215, 0, 0.35);
      }

      .logo {
        width: 90px;
        height: 90px;
        margin: 0 auto 12px;
        border-radius: 50%;
        background: rgba(91, 2, 4, 0.9);
        border: 2px solid #ffd700;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
      }

      h1 {
        font-size: 22px;
        margin-bottom: 4px;
        letter-spacing: 0.04em;
      }

      .subtitle {
        font-size: 13px;
        color: #f0dddd;
        margin-bottom: 18px;
      }

      .btn {
        display: block;
        width: 100%;
        margin: 8px 0;
        padding: 12px 14px;
        border-radius: 999px;
        text-decoration: none;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.03em;
        color: #1b1b1d;
        background: linear-gradient(135deg, #ffd700, #e6b800);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.55);
        border: 1px solid #f5e29b;
        transition:
          transform 0.15s ease,
          box-shadow 0.15s ease,
          filter 0.15s;
      }

      .btn span {
        margin-left: 6px;
      }

      .btn:hover {
        filter: brightness(1.05);
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.7);
      }

      .footer {
        margin-top: 16px;
        font-size: 11px;
        color: #f0caca;
      }

      @media (min-width: 768px) {
        body {
          /* mantém o mesmo degradê no desktop */
          background: radial-gradient(
            circle at top,
            #7a0507 0%,
            #5b0204 40%,
            #2a0001 100%
          );
        }
        .card {
          padding: 28px 28px 32px;
        }
        h1 {
          font-size: 24px;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="logo">LC</div>

      <h1>Nome</h1>
      <p class="subtitle">
        Entre nos grupos exclusivos e receba as ofertas em primeira mão.
      </p>

      <a
        class="btn"
        href="https://chat.whatsapp.com/CMsozwqjt3dIpxiFUHTKOr?mode=gi_t"
      >
        <span>Grupo Teste</span>
      </a>
      <a
        class="btn"
        href="https://www.instagram.com/imperio22centrodebeleza?igsh=MXZqaGpkMWd6cm1pbg=="
      >
        <span>Nosso instagram aqui</span>
      </a>
      <a class="btn" href="https://wa.me/5511999999997">
        <span>Grupo VIP Slim</span>
      </a>
      <a class="btn" href="https://wa.me/5511999999996">
        <span>Grupo Jardim São Francisco</span>
      </a>

      <p class="footer">
        <!-- rodapé opcional -->
      </p>
    </main>
  </body>
</html>
