<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Links da Loja</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: radial-gradient(
          circle at top,
          #7a0507 0%,
          #5b0204 40%,
          #2a0001 100%
        );
        color: #f5f5f5;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }
      .card {
        width: 100%;
        max-width: 420px;
        background: rgba(40, 0, 2, 0.9);
        border-radius: 18px;
        padding: 24px 20px 28px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
        text-align: center;
        border: 2px solid rgba(200, 150, 12, 0.75);
        box-shadow:
          0 8px 25px rgba(0, 0, 0, 0.5),
          0 0 12px rgba(200, 150, 12, 0.2);
      }
      .logo {
        width: 110px;
        height: 110px;
        margin: 0 auto 12px;
        border-radius: 50%;
        border: 3px solid #c8960c;
        box-shadow:
          0 0 0 2px #f5d060,
          0 0 18px 4px rgba(200, 150, 12, 0.5);
        overflow: hidden;
        background: rgb(87, 15, 19);
      }
      .logo img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: center;
        display: block;
      }
      h1 {
        font-size: 22px;
        margin-bottom: 4px;
        letter-spacing: 0.04em;
      }
      .subtitle {
        font-size: 13px;
        color: #f0dddd;
        margin-bottom: 18px;
      }
      .btn {
        display: block;
        width: 100%;
        margin: 8px 0;
        padding: 12px 14px;
        border-radius: 999px;
        text-decoration: none;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.03em;
        color: #1b1b1d;
        background: linear-gradient(
          135deg,
          #c8960c 0%,
          #f5d060 40%,
          #c8960c 100%
        );
        box-shadow:
          0 4px 15px rgba(0, 0, 0, 0.55),
          inset 0 1px 0 rgba(255, 255, 220, 0.4);
        border: 1px solid #a87800;
        transition:
          transform 0.15s ease,
          box-shadow 0.15s ease,
          filter 0.15s;
      }
      .btn span {
        margin-left: 6px;
      }
      .btn:hover {
        filter: brightness(1.1);
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.7);
      }
      .footer {
        margin-top: 16px;
        font-size: 11px;
        color: #f0caca;
      }
      @media (min-width: 768px) {
        .card {
          padding: 28px 28px 32px;
        }
        h1 {
          font-size: 24px;
        }
      }
    </style>
  </head>
